<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Product System 🚀</title>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: flex;
      gap: 30px;
    }

    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
    }

    label { color: #fff; font-size: 13px; }

    input, select {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    select option { color: black; }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-submit {
      background: linear-gradient(45deg, #00ffe0, #00c3ff);
    }

    .btn-excel {
      background: linear-gradient(45deg, #ffb347, #ffcc33);
    }

    .success, .loading {
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    .success { color: #00ffcc; }
    .loading { color: #fff; }

    .preview { color: #fff; text-align: center; }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- 🔥 FORM 1: NHẬP TAY -->
  <div class="container">
    <h2>📦 产品录入</h2>

    <form id="form">
      <label>产品名称</label>
      <input type="text" name="name" required>

      <label>类型</label>
      <select name="type" required>
        <option value="">选择</option>
        <option>Blister</option>
        <option>Carton</option>
        <option>Medal</option>
        <option>Label</option>
        <option>Color Box</option>
      </select>
      <label>预计时间</label>
      <select name="time" id="timeSelect" required>
        <option value="">选择</option>
        <option value="3-5 ngày">3–5 天</option>
        <option value="5-7 ngày">5–7 天</option>
      </select>

      <div class="preview" id="previewDate"></div>

      <button type="submit" class="btn-submit">提交 🚀</button>
    </form>

    <div class="loading" id="loading">⏳ Sending...</div>
    <div class="success" id="successMsg">✅ Success!</div>
  </div>


  <!-- 🔥 FORM 2: EXCEL -->
  <!-- <div class="container">
    <h2>📊 Excel 上传</h2>

    <input type="file" id="excelFile" accept=".xlsx, .xls">

    <button class="btn-excel" onclick="handleExcel()">读取 Excel 📊</button>

    <div class="success" id="excelSuccess">✅ 已读取 (Check console)</div>
  </div> -->

</div>

<script>
// ===== FORM 1 =====
const form = document.getElementById("form");
const loading = document.getElementById("loading");
const successMsg = document.getElementById("successMsg");
const preview = document.getElementById("previewDate");

function calculateDate(range) {
  const today = new Date();
  let days = 0;

  if (range === "3-5 ngày") days = 5;
  if (range === "5-7 ngày") days = 7;

  today.setDate(today.getDate() + days);
  return today.toISOString().split("T")[0];
}

document.getElementById("timeSelect").addEventListener("change", function() {
  preview.innerHTML = this.value ? calculateDate(this.value) : "";
});

form.addEventListener("submit", function(e) {
  e.preventDefault();

  loading.style.display = "block";

  const data = {
    name: form.name.value,
    type: form.type.value,
    time: calculateDate(form.time.value)
  };

  fetch("https://script.google.com/macros/s/AKfycbzsGLGYwp47HHYNbEpfm9X7Z4--jW-5R-ZOg20JbMMIzXZUMwGpZbaS6AD2_rZto433cg/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {
    loading.style.display = "none";
    successMsg.style.display = "block";
    form.reset();
    preview.innerHTML = "";
  });
});


// ===== FORM 2 (EXCEL) =====
function handleExcel() {
  const file = document.getElementById("excelFile").files[0];
  if (!file) {
    alert("请选择 Excel 文件");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    console.log("Excel data:", json);

    document.getElementById("excelSuccess").style.display = "block";
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
