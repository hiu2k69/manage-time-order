<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>产品录入 / Product Form 🚀</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      padding: 35px;
      border-radius: 25px;
      width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease;
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 15px;
    }

    label {
      color: #fff;
      font-size: 13px;
      margin-top: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    select option {
      color: black;
    }

    input:focus, select:focus {
      transform: scale(1.04);
      box-shadow: 0 0 10px #00ffe0;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #00ffe0, #00c3ff);
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.05);
    }

    .success {
      text-align: center;
      color: #00ffcc;
      display: none;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      color: #fff;
      display: none;
      margin-top: 10px;
    }

    .preview {
      color: #fff;
      font-size: 13px;
      text-align: center;
      margin-top: 5px;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📦 产品录入 / Product Form</h2>

  <form id="form">
    <label>产品名称 / Product Name</label>
    <input type="text" name="name" required>

    <label>类型 / Type</label>
    <select name="type" required>
      <option value="">选择 / Select</option>
      <option value="Blister">Blister</option>
      <option value="Carton">Carton</option>
      <option value="Medal">Medal</option>
      <option value="Label">Label</option>
      <option value="Color Box">Color Box</option>
    </select>

    <label>阶段 / Stage</label>
    <select name="message" required>
      <option value="">选择 / Select</option>
      <option value="FS">FS</option>
      <option value="EP">EP</option>
      <option value="FEP">FEP</option>
      <option value="PP">PP</option>
      <option value="PS">PS</option>
    </select>

    <label>预计时间 / Estimated Time</label>
    <select name="time" id="timeSelect" required>
      <option value="">选择 / Select</option>
      <option value="3-5 ngày">3–5 天 / days</option>
      <option value="5-7 ngày">5–7 天 / days</option>
    </select>

    <div class="preview" id="previewDate"></div>

    <button type="submit">提交 / Submit 🚀</button>
  </form>

  <div class="loading" id="loading">⏳ 发送中... / Sending...</div>
  <div class="success" id="successMsg">✅ 成功 / Success!</div>
</div>

<script>
const form = document.getElementById("form");
const successMsg = document.getElementById("successMsg");
const loading = document.getElementById("loading");
const preview = document.getElementById("previewDate");
const timeSelect = document.getElementById("timeSelect");

// 🔥 tính ngày
function calculateDate(range) {
  const today = new Date();
  let days = 0;

  if (range === "3-5 ngày") days = 5;
  if (range === "5-7 ngày") days = 7;

  today.setDate(today.getDate() + days);

  return today.toISOString().split("T")[0];
}

// 🔥 hiển thị preview
timeSelect.addEventListener("change", function() {
  if (!this.value) {
    preview.innerHTML = "";
    return;
  }

  const date = calculateDate(this.value);
  preview.innerHTML = "预计完成日期 / Estimated Date: " + date;
});

form.addEventListener("submit", function (e) {
  e.preventDefault();

  loading.style.display = "block";
  successMsg.style.display = "none";

  const selectedRange = form.time.value;
  const calculatedDate = calculateDate(selectedRange);

  const data = {
    name: form.name.value,
    type: form.type.value,
    message: form.message.value,
    time: calculatedDate
  };

  console.log("Data:", data);

  fetch("https://script.google.com/macros/s/AKfycbyidKCMmfrqEbhvTL7H4JtDAcHo4TkqKMtwxLu8t7-XCnfTRxKNy_kstLwcoUXglex5-w/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {
    loading.style.display = "none";
    successMsg.style.display = "block";
    form.reset();
    preview.innerHTML = "";
  })
  .catch(err => {
    loading.style.display = "none";
    alert("Error 😢");
    console.error(err);
  });
});
</script>

</body>
</html>
